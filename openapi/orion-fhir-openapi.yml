          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /CarePlan:
    get:
      operationId: searchCarePlans
      summary: Orion Health Search for care plans
      description: >-
        Search for CarePlan resources describing planned healthcare activities
        and goals for patients.
      tags:
        - CarePlan
      parameters:
        - $ref: '#/components/parameters/FhirFormat'
        - $ref: '#/components/parameters/FhirCount'
        - $ref: '#/components/parameters/FhirOffset'
        - name: patient
          in: query
          description: Reference to the patient
          schema:
            type: string
        - name: status
          in: query
          description: Care plan status
          schema:
            type: string
            enum:
              - draft
              - active
              - on-hold
              - revoked
              - completed
              - entered-in-error
              - unknown
        - name: category
          in: query
          description: Type of care plan
          schema:
            type: string
        - name: date
          in: query
          description: Care plan period
          schema:
            type: string
      responses:
        '200':
          description: Bundle of matching CarePlan resources
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /CarePlan/{id}:
    get:
      operationId: getCarePlan
      summary: Orion Health Read a care plan by ID
      description: Retrieve a specific CarePlan resource by its logical ID.
      tags:
        - CarePlan
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/FhirFormat'
      responses:
        '200':
          description: CarePlan resource
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/CarePlan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /Immunization:
    get:
      operationId: searchImmunizations
      summary: Orion Health Search for immunizations
      description: >-
        Search for Immunization resources representing vaccine administrations.
      tags:
        - Immunization
      parameters:
        - $ref: '#/components/parameters/FhirFormat'
        - $ref: '#/components/parameters/FhirCount'
        - $ref: '#/components/parameters/FhirOffset'
        - name: patient
          in: query
          description: Reference to the patient
          schema:
            type: string
        - name: date
          in: query
          description: Vaccination date or date range
          schema:
            type: string
        - name: vaccine-code
          in: query
          description: CVX code for the vaccine
          schema:
            type: string
        - name: status
          in: query
          description: Immunization status
          schema:
            type: string
            enum:
              - completed
              - entered-in-error
              - not-done
      responses:
        '200':
          description: Bundle of matching Immunization resources
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /Immunization/{id}:
    get:
      operationId: getImmunization
      summary: Orion Health Read an immunization by ID
      description: Retrieve a specific Immunization resource by its logical ID.
      tags:
        - Immunization
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/FhirFormat'
      responses:
        '200':
          description: Immunization resource
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Immunization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /DocumentReference:
    get:
      operationId: searchDocumentReferences
      summary: Orion Health Search for document references
      description: >-
        Search for DocumentReference resources representing clinical documents,
        notes, and reports.
      tags:
        - DocumentReference
      parameters:
        - $ref: '#/components/parameters/FhirFormat'
        - $ref: '#/components/parameters/FhirCount'
        - $ref: '#/components/parameters/FhirOffset'
        - name: patient
          in: query
          description: Reference to the patient
          schema:
            type: string
        - name: type
          in: query
          description: Document type code
          schema:
            type: string
        - name: category
          in: query
          description: Document category
          schema:
            type: string
        - name: date
          in: query
          description: Document date or date range
          schema:
            type: string
        - name: status
          in: query
          description: Document status
          schema:
            type: string
            enum:
              - current
              - superseded
              - entered-in-error
      responses:
        '200':
          description: Bundle of matching DocumentReference resources
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /DocumentReference/{id}:
    get:
      operationId: getDocumentReference
      summary: Orion Health Read a document reference by ID
      description: Retrieve a specific DocumentReference resource by its logical ID.
      tags:
        - DocumentReference
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/FhirFormat'
      responses:
        '200':
          description: DocumentReference resource
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/DocumentReference'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authorization using SMART on FHIR
      flows:
        authorizationCode:
          authorizationUrl: https://auth.orionhealth.com/oauth2/authorize
          tokenUrl: https://auth.orionhealth.com/oauth2/token
          scopes:
            patient/*.read: Read access to all patient data
            patient/*.write: Write access to all patient data
            patient/Patient.read: Read access to Patient resources
            patient/Observation.read: Read access to Observation resources
            patient/Condition.read: Read access to Condition resources
            patient/MedicationRequest.read: Read access to MedicationRequest resources
            launch: Launch context
            openid: OpenID Connect
            fhirUser: FHIR user identity
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Logical ID of the FHIR resource
      schema:
        type: string
    FhirFormat:
      name: _format
      in: query
      description: Response format
      schema:
        type: string
        enum:
          - application/fhir+json
          - application/fhir+xml
    FhirCount:
      name: _count
      in: query
      description: Maximum number of results per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    FhirOffset:
      name: _offset
      in: query
      description: Starting offset for paging
      schema:
        type: integer
        minimum: 0
        default: 0
  schemas:
    Resource:
      type: object
      properties:
        resourceType:
          type: string
          description: Type of FHIR resource
        id:
          type: string
          description: Logical ID of the resource
        meta:
          type: object
          properties:
            versionId:
              type: string
            lastUpdated:
              type: string
              format: date-time
            profile:
              type: array
              items:
                type: string
                format: uri
    Bundle:
      type: object
      properties:
        resourceType:
          type: string
          const: Bundle
        type:
          type: string
          enum:
            - searchset
            - batch-response
            - history
        total:
          type: integer
          description: Total number of matching results
        link:
          type: array
          items:
            type: object
            properties:
              relation:
                type: string
                enum:
                  - self
                  - next
                  - previous
                  - first
                  - last
              url:
                type: string
                format: uri
        entry:
          type: array
          items:
            type: object
            properties:
              fullUrl:
                type: string
                format: uri
              resource:
                $ref: '#/components/schemas/Resource'
              search:
                type: object
                properties:
                  mode:
                    type: string
                    enum:
                      - match
                      - include
                      - outcome
    Patient:
      type: object
      properties:
        resourceType:
          type: string
          const: Patient
        id:
          type: string
        meta:
          type: object
          properties:
            versionId:
              type: string
            lastUpdated:
              type: string
              format: date-time
        identifier:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
        active:
          type: boolean
        name:
          type: array
          items:
            $ref: '#/components/schemas/HumanName'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/ContactPoint'
        gender:
          type: string
          enum:
            - male
            - female
            - other
            - unknown
        birthDate:
          type: string
          format: date
        deceasedBoolean:
          type: boolean
        address:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        maritalStatus:
          $ref: '#/components/schemas/CodeableConcept'
        communication:
          type: array
          items:
            type: object
            properties:
              language:
                $ref: '#/components/schemas/CodeableConcept'
              preferred:
                type: boolean
    Encounter:
      type: object
      properties:
        resourceType:
          type: string
          const: Encounter
        id:
          type: string
        status:
          type: string
          enum:
            - planned
            - arrived
            - triaged
            - in-progress
            - onleave
            - finished
            - cancelled
        class:
          $ref: '#/components/schemas/Coding'
        type:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        subject:
          $ref: '#/components/schemas/Reference'
        period:
          $ref: '#/components/schemas/Period'
        reasonCode:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        participant:
          type: array
          items:
            type: object
            properties:
              type:
                type: array
                items:
                  $ref: '#/components/schemas/CodeableConcept'
              individual:
                $ref: '#/components/schemas/Reference'
    Observation:
      type: object
      properties:
        resourceType:
          type: string
          const: Observation
        id:
          type: string
        status:
          type: string
          enum:
            - registered
            - preliminary
            - final
            - amended
            - corrected
            - cancelled
            - entered-in-error
            - unknown
        category:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        code:
          $ref: '#/components/schemas/CodeableConcept'
        subject:
          $ref: '#/components/schemas/Reference'
        effectiveDateTime:
          type: string
          format: date-time
        valueQuantity:
          $ref: '#/components/schemas/Quantity'
        valueString:
          type: string
        valueCodeableConcept:
          $ref: '#/components/schemas/CodeableConcept'
        interpretation:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        referenceRange:
          type: array
          items:
            type: object
            properties:
              low:
                $ref: '#/components/schemas/Quantity'
              high:
                $ref: '#/components/schemas/Quantity'
              text:
                type: string
    Condition:
      type: object
      properties:
        resourceType:
          type: string
          const: Condition
        id:
          type: string
        clinicalStatus:
          $ref: '#/components/schemas/CodeableConcept'
        verificationStatus:
          $ref: '#/components/schemas/CodeableConcept'
        category:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        severity:
          $ref: '#/components/schemas/CodeableConcept'
        code:
          $ref: '#/components/schemas/CodeableConcept'
        subject:
          $ref: '#/components/schemas/Reference'
        onsetDateTime:
          type: string
          format: date-time
        recordedDate:
          type: string
          format: date-time
    MedicationRequest:
      type: object
      properties:
        resourceType:
          type: string
          const: MedicationRequest
        id:
          type: string
        status:
          type: string
          enum:
            - active
            - on-hold
            - cancelled
            - completed
            - entered-in-error
            - stopped
            - draft
            - unknown
        intent:
          type: string
          enum:
            - proposal
            - plan
            - order
            - original-order
            - reflex-order
            - filler-order
            - instance-order
            - option
        medicationCodeableConcept:
          $ref: '#/components/schemas/CodeableConcept'
        medicationReference:
          $ref: '#/components/schemas/Reference'
        subject:
          $ref: '#/components/schemas/Reference'
        authoredOn:
          type: string
          format: date-time
        requester:
          $ref: '#/components/schemas/Reference'
        dosageInstruction:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              timing:
                type: object
                properties:
                  repeat:
                    type: object
                    properties:
                      frequency:
                        type: integer
                      period:
                        type: number
                      periodUnit:
                        type: string
              doseAndRate:
                type: array
                items:
                  type: object
                  properties:
                    doseQuantity:
                      $ref: '#/components/schemas/Quantity'
    AllergyIntolerance:
      type: object
      properties:
        resourceType:
          type: string
          const: AllergyIntolerance
        id:
          type: string
        clinicalStatus:
          $ref: '#/components/schemas/CodeableConcept'
        verificationStatus:
          $ref: '#/components/schemas/CodeableConcept'
        type:
          type: string
          enum:
            - allergy
            - intolerance
        category:
          type: array
          items:
            type: string
            enum:
              - food
              - medication
              - environment
              - biologic
        criticality:
          type: string
          enum:
            - low
            - high
            - unable-to-assess
        code:
          $ref: '#/components/schemas/CodeableConcept'
        patient:
          $ref: '#/components/schemas/Reference'
        reaction:
          type: array
          items:
            type: object
            properties:
              substance:
                $ref: '#/components/schemas/CodeableConcept'
              manifestation:
                type: array
                items:
                  $ref: '#/components/schemas/CodeableConcept'
              severity:
                type: string
                enum:
                  - mild
                  - moderate
                  - severe
    Procedure:
      type: object
      properties:
        resourceType:
          type: string
          const: Procedure
        id:
          type: string
        status:
          type: string
          enum:
            - preparation
            - in-progress
            - not-done
            - on-hold
            - stopped
            - completed
            - entered-in-error
            - unknown
        code:
          $ref: '#/components/schemas/CodeableConcept'
        subject:
          $ref: '#/components/schemas/Reference'
        performedDateTime:
          type: string
          format: date-time
        performedPeriod:
          $ref: '#/components/schemas/Period'
        performer:
          type: array
          items:
            type: object
            properties:
              actor:
                $ref: '#/components/schemas/Reference'
    DiagnosticReport:
      type: object
      properties:
        resourceType:
          type: string
          const: DiagnosticReport
        id:
          type: string
        status:
          type: string
          enum:
            - registered
            - partial
            - preliminary
            - final
            - amended
            - corrected
            - appended
            - cancelled
            - entered-in-error
            - unknown
        category:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        code:
          $ref: '#/components/schemas/CodeableConcept'
        subject:
          $ref: '#/components/schemas/Reference'
        effectiveDateTime:
          type: string
          format: date-time
        issued:
          type: string
          format: date-time
        result:
          type: array
          items:
            $ref: '#/components/schemas/Reference'
        conclusion:
          type: string
    CarePlan:
      type: object
      properties:
        resourceType:
          type: string
          const: CarePlan
        id:
          type: string
        status:
          type: string
          enum:
            - draft
            - active
            - on-hold
            - revoked
            - completed
            - entered-in-error
            - unknown
        intent:
          type: string
          enum:
            - proposal
            - plan
            - order
            - option
        category:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        subject:
          $ref: '#/components/schemas/Reference'
        period:
          $ref: '#/components/schemas/Period'
        activity:
          type: array
          items:
            type: object
            properties:
              detail:
                type: object
                properties:
                  status:
                    type: string
                  code:
                    $ref: '#/components/schemas/CodeableConcept'
                  description:
                    type: string
    Immunization:
      type: object
      properties:
        resourceType:
          type: string
          const: Immunization
        id:
          type: string
        status:
          type: string
          enum:
            - completed
            - entered-in-error
            - not-done
        vaccineCode:
          $ref: '#/components/schemas/CodeableConcept'
        patient:
          $ref: '#/components/schemas/Reference'
        occurrenceDateTime:
          type: string
          format: date-time
        lotNumber:
          type: string
        site:
          $ref: '#/components/schemas/CodeableConcept'
        route:
          $ref: '#/components/schemas/CodeableConcept'
        doseQuantity:
          $ref: '#/components/schemas/Quantity'
    DocumentReference:
      type: object
      properties:
        resourceType:
          type: string
          const: DocumentReference
        id:
          type: string
        status:
          type: string
          enum:
            - current
            - superseded
            - entered-in-error
        type:
          $ref: '#/components/schemas/CodeableConcept'
        category:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        subject:
          $ref: '#/components/schemas/Reference'
        date:
          type: string
          format: date-time
        content:
          type: array
          items:
            type: object
            properties:
              attachment:
                type: object
                properties:
                  contentType:
                    type: string
                  url:
                    type: string
                    format: uri
                  title:
                    type: string
    CapabilityStatement:
      type: object
      properties:
        resourceType:
          type: string
          const: CapabilityStatement
        status:
          type: string
        date:
          type: string
          format: date-time
        kind:
          type: string
        fhirVersion:
          type: string
        format:
          type: array
          items:
            type: string
        rest:
          type: array
          items:
            type: object
            properties:
              mode:
                type: string
              resource:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    interaction:
                      type: array
                      items:
                        type: object
                        properties:
                          code:
                            type: string
    OperationOutcome:
      type: object
      properties:
        resourceType:
          type: string
          const: OperationOutcome
        issue:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
                enum:
                  - fatal
                  - error
                  - warning
                  - information
              code:
                type: string
              diagnostics:
                type: string
              details:
                $ref: '#/components/schemas/CodeableConcept'
    Identifier:
      type: object
      properties:
        use:
          type: string
          enum:
            - usual
            - official
            - temp
            - secondary
            - old
        system:
          type: string
          format: uri
        value:
          type: string
    HumanName:
      type: object
      properties:
        use:
          type: string
          enum:
            - usual
            - official
            - temp
            - nickname
            - anonymous
            - old
            - maiden
        family:
          type: string
        given:
          type: array
          items:
            type: string
        prefix:
          type: array
          items:
            type: string
        suffix:
          type: array
          items:
            type: string
    ContactPoint:
      type: object
      properties:
        system:
          type: string
          enum:
            - phone
            - fax
            - email
            - pager
            - url
            - sms
            - other
        value:
          type: string
        use:
          type: string
          enum:
            - home
            - work
            - temp
            - old
            - mobile
    Address:
      type: object
      properties:
        use:
          type: string
          enum:
            - home
            - work
            - temp
            - old
            - billing
        type:
          type: string
          enum:
            - postal
            - physical
            - both
        line:
          type: array
          items:
            type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
    CodeableConcept:
      type: object
      properties:
        coding:
          type: array
          items:
            $ref: '#/components/schemas/Coding'
        text:
          type: string
    Coding:
      type: object
      properties:
        system:
          type: string
          format: uri
        code:
          type: string
        display:
          type: string
    Reference:
      type: object
      properties:
        reference:
          type: string
        display:
          type: string
    Period:
      type: object
      properties:
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
    Quantity:
      type: object
      properties:
        value:
          type: number
        unit:
          type: string
        system:
          type: string
          format: uri
        code:
          type: string
  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
    Unauthorized:
      description: Authentication required or token expired
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
    NotFound:
      description: Resource not found
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
    Conflict:
      description: Version conflict during update
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
    UnprocessableEntity:
      description: Resource failed validation
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
