naftiko: 1.0.0-alpha2
info:
  label: Orion Health FHIR API — Observation
  description: 'Orion Health FHIR API — Observation. 3 operations. Lead operation: Orion Health Search for observations. Self-contained
    Naftiko capability covering one Orion business surface.'
  tags:
  - Orion
  - Observation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORION_API_KEY: ORION_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-observation
    baseUri: https://api.orionhealth.com/fhir
    description: Orion Health FHIR API — Observation business capability. Self-contained, no shared references.
    resources:
    - name: Observation
      path: /Observation
      operations:
      - name: searchobservations
        method: GET
        description: Orion Health Search for observations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
          description: Reference to the patient
        - name: category
          in: query
          type: string
          description: Observation category (e.g., vital-signs, laboratory)
        - name: code
          in: query
          type: string
          description: LOINC or SNOMED code for the observation
        - name: date
          in: query
          type: string
          description: Observation date or date range
        - name: status
          in: query
          type: string
          description: Observation status
      - name: createobservation
        method: POST
        description: Orion Health Create a new observation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: Observation-id
      path: /Observation/{id}
      operations:
      - name: getobservation
        method: GET
        description: Orion Health Read an observation by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ORION_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-observation-rest
    port: 8080
    description: REST adapter for Orion Health FHIR API — Observation. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/observation
      name: observation
      description: REST surface for Observation.
      operations:
      - method: GET
        name: searchobservations
        description: Orion Health Search for observations
        call: fhir-observation.searchobservations
        with:
          patient: rest.patient
          category: rest.category
          code: rest.code
          date: rest.date
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createobservation
        description: Orion Health Create a new observation
        call: fhir-observation.createobservation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/observation/{id}
      name: observation-id
      description: REST surface for Observation-id.
      operations:
      - method: GET
        name: getobservation
        description: Orion Health Read an observation by ID
        call: fhir-observation.getobservation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-observation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Orion Health FHIR API — Observation. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: orion-health-search-observations
      description: Orion Health Search for observations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-observation.searchobservations
      with:
        patient: tools.patient
        category: tools.category
        code: tools.code
        date: tools.date
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: orion-health-create-new-observation
      description: Orion Health Create a new observation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fhir-observation.createobservation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: orion-health-read-observation-id
      description: Orion Health Read an observation by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-observation.getobservation
      outputParameters:
      - type: object
        mapping: $.
