naftiko: 1.0.0-alpha2
info:
  label: Orion Health Rhapsody Integration API — Message Queues
  description: 'Orion Health Rhapsody Integration API — Message Queues. 3 operations. Lead operation: Orion Health List message
    queues. Self-contained Naftiko capability covering one Orion business surface.'
  tags:
  - Orion
  - Message Queues
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORION_API_KEY: ORION_API_KEY
capability:
  consumes:
  - type: http
    namespace: rhapsody-message-queues
    baseUri: https://api.orionhealth.com/rhapsody
    description: Orion Health Rhapsody Integration API — Message Queues business capability. Self-contained, no shared references.
    resources:
    - name: queues
      path: /queues
      operations:
      - name: listqueues
        method: GET
        description: Orion Health List message queues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: routeId
          in: query
          type: integer
          description: Filter by route ID
        - name: hasErrors
          in: query
          type: boolean
          description: Only show queues with errors
    - name: queues-queueId
      path: /queues/{queueId}
      operations:
      - name: getqueue
        method: GET
        description: Orion Health Get queue details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queueId
          in: path
          type: integer
          required: true
    - name: queues-queueId-messages
      path: /queues/{queueId}/messages
      operations:
      - name: listqueuemessages
        method: GET
        description: Orion Health List messages in a queue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: queueId
          in: path
          type: integer
          required: true
        - name: status
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.ORION_API_KEY}}'
  exposes:
  - type: rest
    namespace: rhapsody-message-queues-rest
    port: 8080
    description: REST adapter for Orion Health Rhapsody Integration API — Message Queues. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/queues
      name: queues
      description: REST surface for queues.
      operations:
      - method: GET
        name: listqueues
        description: Orion Health List message queues
        call: rhapsody-message-queues.listqueues
        with:
          routeId: rest.routeId
          hasErrors: rest.hasErrors
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/queues/{queueid}
      name: queues-queueid
      description: REST surface for queues-queueId.
      operations:
      - method: GET
        name: getqueue
        description: Orion Health Get queue details
        call: rhapsody-message-queues.getqueue
        with:
          queueId: rest.queueId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/queues/{queueid}/messages
      name: queues-queueid-messages
      description: REST surface for queues-queueId-messages.
      operations:
      - method: GET
        name: listqueuemessages
        description: Orion Health List messages in a queue
        call: rhapsody-message-queues.listqueuemessages
        with:
          queueId: rest.queueId
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rhapsody-message-queues-mcp
    port: 9090
    transport: http
    description: MCP adapter for Orion Health Rhapsody Integration API — Message Queues. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: orion-health-list-message-queues
      description: Orion Health List message queues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rhapsody-message-queues.listqueues
      with:
        routeId: tools.routeId
        hasErrors: tools.hasErrors
      outputParameters:
      - type: object
        mapping: $.
    - name: orion-health-get-queue-details
      description: Orion Health Get queue details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rhapsody-message-queues.getqueue
      with:
        queueId: tools.queueId
      outputParameters:
      - type: object
        mapping: $.
    - name: orion-health-list-messages-queue
      description: Orion Health List messages in a queue
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rhapsody-message-queues.listqueuemessages
      with:
        queueId: tools.queueId
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
