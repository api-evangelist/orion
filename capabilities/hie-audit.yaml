naftiko: 1.0.0-alpha2
info:
  label: Orion Health HIE API — Audit
  description: 'Orion Health HIE API — Audit. 1 operations. Lead operation: Orion Health Search audit logs. Self-contained
    Naftiko capability covering one Orion business surface.'
  tags:
  - Orion
  - Audit
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORION_API_KEY: ORION_API_KEY
capability:
  consumes:
  - type: http
    namespace: hie-audit
    baseUri: https://api.orionhealth.com/hie
    description: Orion Health HIE API — Audit business capability. Self-contained, no shared references.
    resources:
    - name: audit-logs
      path: /audit-logs
      operations:
      - name: searchauditlogs
        method: GET
        description: Orion Health Search audit logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patientId
          in: query
          type: string
        - name: userId
          in: query
          type: string
        - name: action
          in: query
          type: string
        - name: dateFrom
          in: query
          type: string
        - name: dateTo
          in: query
          type: string
        - name: outcome
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.ORION_API_KEY}}'
  exposes:
  - type: rest
    namespace: hie-audit-rest
    port: 8080
    description: REST adapter for Orion Health HIE API — Audit. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/audit-logs
      name: audit-logs
      description: REST surface for audit-logs.
      operations:
      - method: GET
        name: searchauditlogs
        description: Orion Health Search audit logs
        call: hie-audit.searchauditlogs
        with:
          patientId: rest.patientId
          userId: rest.userId
          action: rest.action
          dateFrom: rest.dateFrom
          dateTo: rest.dateTo
          outcome: rest.outcome
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hie-audit-mcp
    port: 9090
    transport: http
    description: MCP adapter for Orion Health HIE API — Audit. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: orion-health-search-audit-logs
      description: Orion Health Search audit logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hie-audit.searchauditlogs
      with:
        patientId: tools.patientId
        userId: tools.userId
        action: tools.action
        dateFrom: tools.dateFrom
        dateTo: tools.dateTo
        outcome: tools.outcome
      outputParameters:
      - type: object
        mapping: $.
