        description: Orion Health Get server capability statement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: patient
      path: /Patient
      operations:
      - name: searchpatients
        method: GET
        description: Orion Health Search for patients
        inputParameters:
        - name: _id
          in: query
          type: string
          description: Logical ID of the patient resource
        - name: identifier
          in: query
          type: string
          description: Patient identifier (e.g., MRN, SSN) in format system|value
        - name: family
          in: query
          type: string
          description: Family (last) name of the patient
        - name: given
          in: query
          type: string
          description: Given (first) name of the patient
        - name: name
          in: query
          type: string
          description: Any part of the patient name
        - name: birthdate
          in: query
          type: string
          description: Patient date of birth (YYYY-MM-DD)
        - name: gender
          in: query
          type: string
          description: Patient gender
        - name: address
          in: query
          type: string
          description: Any part of the patient address
        - name: telecom
          in: query
          type: string
          description: Patient phone number or email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createpatient
        method: POST
        description: Orion Health Create a new patient
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: patient-id
      path: /Patient/{id}
      operations:
      - name: getpatient
        method: GET
        description: Orion Health Read a patient by ID
        outputRawFormat: json
        outputParameters:
        - name: result
