naftiko: 1.0.0-alpha2
info:
  label: Orion Health FHIR API
  description: The Orion Health FHIR API provides standards-based access to healthcare data using the HL7 FHIR (Fast Healthcare
    Interoperability Resources) specification. It enables healthcare organizations to read, search, create, and update clinical
    resources including patients, encounters, observations, conditions, medications, allergies, procedures, diagnostic reports,
    and care plans. The API conforms to FHIR R4 (v4.0.1) and supports both JSON and XML representations.
  tags:
  - Orion
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
